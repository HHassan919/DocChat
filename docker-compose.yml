# docker-compose.yml — Local development stack for DocChat.
# Runs the FastAPI backend and Next.js frontend together on localhost.
# Usage: docker-compose up --build

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - FRONTEND_ORIGIN=http://localhost:3000
      - HF_API_TOKEN=${HF_API_TOKEN:-}
    volumes:
      # Mount sample_docs so they persist across container rebuilds
      - ./backend/sample_docs:/app/sample_docs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
