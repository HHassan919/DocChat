# render.yaml — Render.com deployment configuration for DocChat backend.
# Reference: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: docchat-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HF_API_TOKEN
        sync: false  # Set this in the Render dashboard
      - key: FRONTEND_ORIGIN
        sync: false  # Set this to your Vercel deployment URL
